name: Sync Berkeley classes to Supabase

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  sync-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Build berkeley-classes
        run: go build -o berkeley-classes ./cmd/berkeley-classes

      - name: Sync all subjects
        run: |
          set +e  # one subject failing must not skip the rest or the push
          failures=0
          subjects=(
            'Computer Science'
            'Electrical Engineering and Computer Sciences'
            'Mathematics'
            'Statistics'
            'Data Science'
            'Computing, Data Science, and Society'
            'Economics'
            'Physics'
            'Chemistry'
            'Mechanical Engineering'
            'Molecular and Cell Biology'
            'Cognitive Science'
            'English'
            'History'
            'College Writing Programs'
            'Earth and Planetary Science'
          )
          for s in "${subjects[@]}"; do
            echo "::group::Sync $s"
            if ! ./berkeley-classes sync --term 'Fall 2026' --subject "$s" --max-pages 50; then
              echo "::warning::sync failed for $s"
              failures=$((failures + 1))
            fi
            echo "::endgroup::"
          done
          echo "Per-subject failures: $failures"
          # Don't exit non-zero unless EVERY subject failed
          if [ "$failures" -ge "${#subjects[@]}" ]; then
            echo "::error::All subjects failed"
            exit 1
          fi

      - name: Push to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: ./berkeley-classes push

      - name: Notify watch subscribers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_FROM_EMAIL: ${{ vars.NOTIFY_FROM_EMAIL }}
          NOTIFY_BASE_URL: ${{ vars.NOTIFY_BASE_URL }}
        run: ./berkeley-classes notify
